<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Protected Link</title>
  <style>
    :root {
      --bg1: #0b1020;
      --bg2: #151b34;
      --bg3: #211645;
      --card: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.16);
      --text: #f3f6ff;
      --muted: #b9c2e4;
      --danger: #ff6b84;
      --success: #49d7a8;
      --shadow: 0 20px 45px rgba(0, 0, 0, 0.42);
      --calc-body: #1d233d;
      --calc-screen: #0a1024;
      --calc-key: #2a3150;
      --calc-key-hover: #36406a;
      --calc-op: #3a2e75;
      --calc-op-hover: #4b3996;
      --calc-eq: #49d7a8;
      --calc-eq-hover: #64f0be;
    }

    * {
      box-sizing: border-box;
      user-select: none;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Segoe UI", Inter, Arial, sans-serif;
      color: var(--text);
    }

    body {
      display: grid;
      place-items: center;
      padding: 20px;
      overflow: hidden;
      background:
        radial-gradient(900px 600px at 12% 10%, rgba(106, 169, 255, 0.18), transparent 60%),
        radial-gradient(800px 600px at 90% 0%, rgba(139, 109, 255, 0.2), transparent 60%),
        linear-gradient(145deg, var(--bg1), var(--bg2) 45%, var(--bg3));
      animation: hueShift 18s ease-in-out infinite alternate;
    }

    @keyframes hueShift {
      from { filter: hue-rotate(0deg); }
      to { filter: hue-rotate(14deg); }
    }

    .orbs {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .orb {
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      filter: blur(50px);
      opacity: 0.25;
      animation: float 14s ease-in-out infinite;
    }

    .orb.one { background: #6aa9ff; top: -70px; left: -70px; }
    .orb.two { background: #8b6dff; top: 10%; right: -80px; animation-delay: -4s; }
    .orb.three { background: #49d7a8; bottom: -90px; left: 20%; animation-delay: -8s; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(18px, -20px) scale(1.06); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 430px;
      text-align: center;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 22px 20px;
      transform: translateY(14px);
      opacity: 0;
      animation: cardIn 700ms cubic-bezier(.2, .85, .2, 1) forwards;
    }

    @keyframes cardIn {
      to { transform: translateY(0); opacity: 1; }
    }

    h2 {
      margin: 0 0 6px;
      font-size: 1.45rem;
      letter-spacing: 0.3px;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .calc-shell {
      margin-top: 16px;
      border-radius: 16px;
      background: linear-gradient(160deg, #222b4a, #161c33);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 12px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .calc-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      padding: 0 2px;
      font-size: 0.75rem;
      color: #b8c4ee;
      letter-spacing: 0.3px;
    }

    .calc-screen-wrap {
      background: var(--calc-screen);
      border-radius: 10px;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      margin-bottom: 10px;
    }

    #display {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: #e7eeff;
      text-align: right;
      font-size: 1.9rem;
      letter-spacing: 0.6px;
      font-family: "Consolas", "Courier New", monospace;
      pointer-events: none;
    }

    .keys {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .key {
      border: none;
      border-radius: 10px;
      padding: 12px 8px;
      font-size: 1rem;
      font-weight: 700;
      color: #ecf1ff;
      background: var(--calc-key);
      cursor: pointer;
      transition: transform 0.08s ease, background 0.16s ease, filter 0.16s ease;
    }

    .key:hover { background: var(--calc-key-hover); }
    .key:active { transform: scale(0.98); }

    .key.op { background: var(--calc-op); }
    .key.op:hover { background: var(--calc-op-hover); }

    .key.eq {
      background: var(--calc-eq);
      color: #072119;
      grid-column: span 2;
    }

    .key.eq:hover { background: var(--calc-eq-hover); }

    .key.ac { color: #ffd7df; }

    #message {
      margin-top: 12px;
      min-height: 20px;
      font-weight: 600;
      font-size: 0.9rem;
    }

    #gameButton {
      margin-top: 12px;
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      padding: 13px 16px;
      color: #071b18;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(135deg, #49d7a8, #6ef0c3);
      transition: transform 0.17s ease, box-shadow 0.22s ease, filter 0.22s ease;
    }

    #gameButton:hover {
      transform: translateY(-2px);
      filter: brightness(1.04);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.28);
    }

    .hidden {
      display: none !important;
    }

    .shake {
      animation: shake 360ms ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }

    .fade-in {
      animation: fadeScaleIn 380ms ease both;
    }

    @keyframes fadeScaleIn {
      from { opacity: 0; transform: translateY(8px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>
  <div class="orbs" aria-hidden="true">
    <div class="orb one"></div>
    <div class="orb two"></div>
    <div class="orb three"></div>
  </div>

  <div class="container" id="calcBox">
    <h2>Calculator</h2>
    <p>Standard mode</p>

    <div class="calc-shell">
      <div class="calc-top">
        <span>DEG</span>
        <span>SHIFT</span>
        <span>M+  M-  MR</span>
      </div>

      <div class="calc-screen-wrap">
        <input id="display" type="text" value="0" readonly />
      </div>

      <div class="keys">
        <button class="key ac" data-action="clear">AC</button>
        <button class="key" data-action="back">⌫</button>
        <button class="key op" data-value="%">%</button>
        <button class="key op" data-value="/">÷</button>

        <button class="key" data-value="7">7</button>
        <button class="key" data-value="8">8</button>
        <button class="key" data-value="9">9</button>
        <button class="key op" data-value="*">×</button>

        <button class="key" data-value="4">4</button>
        <button class="key" data-value="5">5</button>
        <button class="key" data-value="6">6</button>
        <button class="key op" data-value="-">−</button>

        <button class="key" data-value="1">1</button>
        <button class="key" data-value="2">2</button>
        <button class="key" data-value="3">3</button>
        <button class="key op" data-value="+">+</button>

        <button class="key" data-value="0">0</button>
        <button class="key" data-value=".">.</button>
        <button class="key eq" data-action="equals">=</button>
      </div>
    </div>

    <p id="message"></p>
    <button id="gameButton" class="hidden" onclick="openGame()">Open Game</button>
  </div>

  <script>
    // Secret calculator combo: press "=" after entering this exactly.
    const SECRET_COMBO = "1246+372";

    const display = document.getElementById("display");
    const message = document.getElementById("message");
    const calcBox = document.getElementById("calcBox");
    const gameButton = document.getElementById("gameButton");

    let expression = "";

    function updateDisplay() {
      display.value = expression || "0";
    }

    function pulseError(msg) {
      message.style.color = "#ff6b84";
      message.textContent = msg;
      calcBox.classList.remove("shake");
      void calcBox.offsetWidth;
      calcBox.classList.add("shake");
    }

    function showSuccess() {
      message.style.color = "#49d7a8";
      message.textContent = "✓ Access granted";
      gameButton.classList.remove("hidden");
      gameButton.classList.add("fade-in");
    }

    function safeEval(expr) {
      if (!/^[0-9+\-*/%.() ]+$/.test(expr)) return null;
      try {
        const result = Function("return (" + expr + ")")();
        if (!Number.isFinite(result)) return null;
        return result;
      } catch {
        return null;
      }
    }

    function calculate() {
      const raw = expression.trim();

      if (!raw) {
        pulseError("Enter a calculation first.");
        return;
      }

      // Unlock check: exact hidden combo + equals
      if (raw === SECRET_COMBO) {
        showSuccess();
        return;
      }

      const result = safeEval(raw);
      if (result === null) {
        pulseError("Invalid expression");
        return;
      }

      expression = String(result);
      updateDisplay();
      message.style.color = "#b9c2e4";
      message.textContent = "";
    }

    function appendValue(value) {
      if (expression.length >= 40) return;
      expression += value;
      updateDisplay();
    }

    function backspace() {
      expression = expression.slice(0, -1);
      updateDisplay();
    }

    function clearAll() {
      expression = "";
      updateDisplay();
      message.textContent = "";
    }

    document.querySelectorAll(".key").forEach(function (btn) {
      btn.addEventListener("click", function () {
        const action = btn.getAttribute("data-action");
        const value = btn.getAttribute("data-value");

        if (action === "clear") return clearAll();
        if (action === "back") return backspace();
        if (action === "equals") return calculate();
        if (value) appendValue(value);
      });
    });

    document.addEventListener("keydown", function (event) {
      const key = event.key;

      if (/^[0-9+\-*/%.()]$/.test(key)) {
        appendValue(key);
      } else if (key === "Enter" || key === "=") {
        event.preventDefault();
        calculate();
      } else if (key === "Backspace") {
        backspace();
      } else if (key === "Escape") {
        clearAll();
      }
    });

    function openGame() {
      var win = window.open();
      if (!win) {
        alert("Popup blocked! Please allow popups for this site.");
        return;
      }

      var url = "https://yf7kv9jmms-tech.github.io/djgkkfkfi/";

      // Loading screen before iframe appears.
      win.document.open();
      win.document.write(
        "<!DOCTYPE html><html><head><title>Loading...</title><meta charset='UTF-8'>" +
        "<style>" +
        "html,body{margin:0;height:100%;overflow:hidden;background:#0d1020;color:#f3f6ff;font-family:Segoe UI,Arial,sans-serif;}" +
        ".loader{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;" +
        "background:radial-gradient(circle at 25% 20%,#23356b,transparent 56%),linear-gradient(145deg,#0b1020,#1a2140);" +
        "transition:opacity .45s ease;z-index:10;}" +
        ".spinner{width:54px;height:54px;border:4px solid rgba(255,255,255,.2);border-top-color:#7cb0ff;border-radius:50%;animation:spin .9s linear infinite;}" +
        ".txt{font-size:14px;opacity:.92;letter-spacing:.2px;}" +
        "@keyframes spin{to{transform:rotate(360deg)}}" +
        "iframe{width:100%;height:100%;border:none;opacity:0;transition:opacity .35s ease;}" +
        "</style></head><body>" +
        "<div id='loader' class='loader'><div class='spinner'></div><div class='txt'>Loading game...</div></div>" +
        "</body></html>"
      );
      win.document.close();

      // Same iframe opening method retained.
      var iframe = win.document.createElement("iframe");
      iframe.style.width = "100%";
      iframe.style.height = "100%";
      iframe.style.border = "none";
      iframe.src = url;

      iframe.onload = function () {
        var loader = win.document.getElementById("loader");
        if (loader) {
          loader.style.opacity = "0";
          setTimeout(function () {
            if (loader.parentNode) loader.parentNode.removeChild(loader);
          }, 460);
        }
        iframe.style.opacity = "1";
      };

      win.document.body.style.margin = "0";
      win.document.body.style.padding = "0";
      win.document.body.style.overflow = "hidden";
      win.document.body.appendChild(iframe);
    }
  </script>
</body>
</html>
