<!DOCTYPE html>
<html>
<head>
    <title>Protected Link</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #1a1a2e;
            color: #eee;
        }
        .container {
            text-align: center;
            background: #16213e;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        input {
            padding: 10px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            margin: 10px;
            width: 250px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #ff6b6b;
        }
        #message {
            margin-top: 15px;
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔒 Protected Link</h2>
        <p>Enter password to access:</p>
        <input type="password" id="passwordInput" placeholder="Enter password...">
        <br>
        <button onclick="checkPassword()">Open Link</button>
        <p id="message"></p>
    </div>

    <script>
        const CORRECT_PASSWORD = "HyW0g839@(!@/9";
        const TARGET_URL = "https://yf7kv9jmms-tech.github.io/nfjfkvkvkvkfnf/";

        function checkPassword() {
            const input = document.getElementById("passwordInput").value;
            const message = document.getElementById("message");

            if (input === CORRECT_PASSWORD) {
                message.style.color = "#4ecca3";
                message.textContent = "✓ Access granted! Opening...";
                var w = window.open('about:blank');
                w.document.location = TARGET_URL;
            } else {
                message.style.color = "#ff6b6b";
                message.textContent = "✗ Incorrect password. Try again.";
                document.getElementById("passwordInput").value = "";
            }
        }

        // Allow Enter key to submit
        document.getElementById("passwordInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                checkPassword();
            }
        });
    </script>
</body>
</html>
