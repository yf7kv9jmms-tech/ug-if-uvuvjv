<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Desktop Workspace</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Wood Table Tones */
      --table-base: #5d4037;
      --table-grain: #4e342e;
      
      /* Calculator Body */
      --calc-body: #1a1a1a;
      --calc-edge: #2c2c2c;
      
      /* LCD Screen */
      --lcd-bg: #8ba88e;
      --lcd-text: #2b332b;
      
      /* Buttons */
      --btn-rubber: #222222;
      --btn-text: #d1d1d1;
      --btn-op: #2a2a2a;
      --btn-eq: #8ba88e;
    }

    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    /* THE WOODEN TABLE */
    body {
      background-color: var(--table-base);
      background-image: 
        repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,0,0,0.05) 40px, rgba(0,0,0,0.05) 80px),
        linear-gradient(to bottom, rgba(255,255,255,0.05) 0%, transparent 100%),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      display: grid;
      place-items: center;
    }

    /* AMBIENT SUNLIGHT OVERLAY */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 10% 10%, rgba(255, 220, 150, 0.15) 0%, transparent 60%);
      pointer-events: none;
      z-index: 10;
    }

    /* ENVIRONMENTAL ELEMENTS (Blurred mug/notebook) */
    .env-mug {
      position: absolute;
      top: -100px;
      right: -100px;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle at center, #eee, #ccc);
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.4;
    }

    .env-notebook {
      position: absolute;
      bottom: -50px;
      left: -100px;
      width: 400px;
      height: 300px;
      background: #fdfdfd;
      transform: rotate(-15deg);
      filter: blur(30px);
      opacity: 0.3;
      box-shadow: 10px 10px 30px rgba(0,0,0,0.2);
    }

    /* THE PHYSICAL CALCULATOR */
    .calculator {
      position: relative;
      width: 360px;
      padding: 30px;
      background: linear-gradient(135deg, var(--calc-edge), var(--calc-body));
      border-radius: 12px;
      /* Physical Depth Shadows */
      box-shadow: 
        25px 40px 60px rgba(0,0,0,0.6), /* Cast shadow on table */
        inset 0 1px 1px rgba(255,255,255,0.1), /* Top edge highlight */
        inset 0 -2px 5px rgba(0,0,0,0.5);
      z-index: 5;
    }

    /* Small scuff marks/imperfections */
    .calculator::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' opacity='0.2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.05;
      pointer-events: none;
    }

    /* LCD SCREEN */
    .screen-container {
      background: #111;
      padding: 12px;
      border-radius: 4px;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.8);
      margin-bottom: 25px;
      position: relative;
      overflow: hidden;
    }

    .lcd {
      background: var(--lcd-bg);
      height: 70px;
      width: 100%;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 15px;
      box-shadow: inset 0 3px 6px rgba(0,0,0,0.3);
      position: relative;
    }

    /* Screen Glare */
    .lcd::after {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(110deg, rgba(255,255,255,0.15) 0%, transparent 50%, rgba(255,255,255,0.05) 100%);
      pointer-events: none;
    }

    #display {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2.2rem;
      color: var(--lcd-text);
      letter-spacing: -1px;
      text-shadow: 1px 1px 1px rgba(0,0,0,0.1);
      background: transparent;
      border: none;
      width: 100%;
      text-align: right;
      outline: none;
    }

    /* BUTTONS */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
    }

    .key {
      aspect-ratio: 1;
      border: none;
      border-radius: 8px;
      background: radial-gradient(circle, #333 0%, #222 100%);
      color: var(--btn-text);
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
      position: relative;
      box-shadow: 
        0 4px 0 #111, /* Bottom depth */
        0 6px 10px rgba(0,0,0,0.4);
      transition: all 0.05s active;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Concave Button Effect */
    .key::before {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 6px;
      background: radial-gradient(circle at center, transparent, rgba(0,0,0,0.2));
    }

    .key:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #000;
    }

    .key.op { color: #8ba88e; }
    .key.ac { color: #ff6b84; }

    .key.eq {
      grid-column: span 2;
      aspect-ratio: auto;
      background: radial-gradient(circle, #2d382e 0%, #1e241e 100%);
      color: var(--lcd-bg);
    }

    #message {
      position: absolute;
      bottom: -35px;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 0.85rem;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }

    /* ACCESS GRANTED BUTTON */
    #gameButton {
      margin-top: 30px;
      width: 100%;
      padding: 15px;
      background: #8ba88e;
      color: #1a231b;
      border: none;
      border-radius: 6px;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      animation: fadeIn 0.5s ease;
    }

    .hidden { display: none !important; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .shake {
      animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
    }

    @keyframes shake {
      10%, 90% { transform: translate3d(-1px, 0, 0); }
      20%, 80% { transform: translate3d(2px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
      40%, 60% { transform: translate3d(4px, 0, 0); }
    }
  </style>
</head>
<body>

  <div class="env-mug"></div>
  <div class="env-notebook"></div>

  <div class="calculator" id="calcBox">
    <div class="screen-container">
      <div class="lcd">
        <input id="display" type="text" value="0" readonly />
      </div>
    </div>

    <div class="grid">
      <button class="key ac" data-action="clear">AC</button>
      <button class="key" data-action="back">⌫</button>
      <button class="key op" data-value="%">%</button>
      <button class="key op" data-value="/">÷</button>

      <button class="key" data-value="7">7</button>
      <button class="key" data-value="8">8</button>
      <button class="key" data-value="9">9</button>
      <button class="key op" data-value="*">×</button>

      <button class="key" data-value="4">4</button>
      <button class="key" data-value="5">5</button>
      <button class="key" data-value="6">6</button>
      <button class="key op" data-value="-">−</button>

      <button class="key" data-value="1">1</button>
      <button class="key" data-value="2">2</button>
      <button class="key" data-value="3">3</button>
      <button class="key op" data-value="+">+</button>

      <button class="key" data-value="0">0</button>
      <button class="key" data-value=".">.</button>
      <button class="key eq" data-action="equals">=</button>
    </div>

    <p id="message"></p>
    <button id="gameButton" class="hidden" onclick="openGame()">Access Granted - Enter</button>
  </div>

  <script>
    const SECRET_COMBO = "1246+372";
    const display = document.getElementById("display");
    const message = document.getElementById("message");
    const calcBox = document.getElementById("calcBox");
    const gameButton = document.getElementById("gameButton");

    let expression = "";

    function updateDisplay() {
      display.value = expression || "0";
    }

    function pulseError(msg) {
      message.style.color = "#ff6b84";
      message.textContent = msg;
      calcBox.classList.remove("shake");
      void calcBox.offsetWidth;
      calcBox.classList.add("shake");
    }

    function showSuccess() {
      message.style.color = "#8ba88e";
      message.textContent = "System Unlocked";
      gameButton.classList.remove("hidden");
    }

    function safeEval(expr) {
      if (!/^[0-9+\-*/%.() ]+$/.test(expr)) return null;
      try {
        const result = Function("return (" + expr + ")")();
        return Number.isFinite(result) ? result : null;
      } catch { return null; }
    }

    function calculate() {
      const raw = expression.trim();
      if (!raw) return;

      if (raw === SECRET_COMBO) {
        showSuccess();
        return;
      }

      const result = safeEval(raw);
      if (result === null) {
        pulseError("ERROR");
        return;
      }

      expression = String(result);
      updateDisplay();
      message.textContent = "";
    }

    function appendValue(value) {
      if (expression.length >= 12) return; // Realistic LCD limit
      expression += value;
      updateDisplay();
    }

    function backspace() {
      expression = expression.slice(0, -1);
      updateDisplay();
    }

    function clearAll() {
      expression = "";
      updateDisplay();
      message.textContent = "";
      gameButton.classList.add("hidden");
    }

    document.querySelectorAll(".key").forEach(btn => {
      btn.addEventListener("click", () => {
        const action = btn.getAttribute("data-action");
        const value = btn.getAttribute("data-value");
        if (action === "clear") clearAll();
        else if (action === "back") backspace();
        else if (action === "equals") calculate();
        else if (value) appendValue(value);
      });
    });

    // Keyboard support
    document.addEventListener("keydown", (e) => {
      if (/^[0-9+\-*/%.()]$/.test(e.key)) appendValue(e.key);
      else if (e.key === "Enter") calculate();
      else if (e.key === "Backspace") backspace();
      else if (e.key === "Escape") clearAll();
    });

    function openGame() {
      const url = "https://yf7kv9jmms-tech.github.io/djgkkfkfi/";
      const win = window.open();
      if (!win) {
        alert("Please allow popups!");
        return;
      }
      
      win.document.write(`
        <html><head><style>
          body { background: #000; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff; font-family: sans-serif; }
          iframe { width: 100%; height: 100%; border: none; }
        </style></head>
        <body><iframe src="${url}"></iframe></body></html>
      `);
    }
  </script>
</body>
</html>
